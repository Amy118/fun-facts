<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fun Facts</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🎉 Fun Facts</h1>
    <div class="card">
      <p id="factText">Click the button to get a fun fact!</p>
    </div>
    <div class="buttons">
      <button onclick="newFact()">New Fact</button>
      <button onclick="copyFact()">Copy</button>
    </div>
    <p id="counter"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
